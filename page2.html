<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>😂 МЕМ PALACE — Галерея Смеха</title>
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Nunito:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f0fce8;
      --surface: #e8f8ff;
      --card: #ffffff;
      --accent1: #e8a0b8;
      --accent2: #c8e000;
      --accent3: #70c8e8;
      --accent4: #90d870;
      --text: #3a4a3a;
      --muted: #7a9a7a;
      --glow1: rgba(144,216,112,0.35);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Nunito', sans-serif;
      overflow-x: hidden;
      cursor: none;
    }

    .cursor {
      width: 18px; height: 18px;
      background: var(--accent1); border-radius: 50%;
      position: fixed; top: 0; left: 0;
      pointer-events: none; z-index: 9999;
      mix-blend-mode: difference;
    }
    .cursor-ring {
      width: 40px; height: 40px;
      border: 2px solid var(--accent3); border-radius: 50%;
      position: fixed; top: 0; left: 0;
      pointer-events: none; z-index: 9998;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 70% 55% at 10% 15%, rgba(184,240,176,0.60) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 85% 10%, rgba(255,248,160,0.55) 0%, transparent 60%),
        radial-gradient(ellipse 65% 55% at 88% 85%, rgba(174,230,255,0.55) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 10% 88%, rgba(255,200,216,0.55) 0%, transparent 60%),
        radial-gradient(ellipse 45% 45% at 50% 50%, rgba(220,248,212,0.40) 0%, transparent 60%);
      pointer-events: none; z-index: 0;
    }

    header {
      position: relative; z-index: 10;
      text-align: center; padding: 70px 20px 50px;
    }
    header::after {
      content: '';
      position: absolute; bottom: 0; left: 10%; right: 10%; height: 1px;
      background: linear-gradient(90deg, transparent, #90d870, #e8a0b8, #70c8e8, transparent);
    }

    .logo-emoji {
      font-size: 64px; display: block;
      animation: bounce 2.5s ease-in-out infinite;
      filter: drop-shadow(0 0 30px var(--accent2));
    }
    @keyframes bounce {
      0%,100% { transform: translateY(0) rotate(-5deg); }
      50% { transform: translateY(-14px) rotate(5deg); }
    }

    h1 {
      font-family: 'Unbounded', sans-serif;
      font-size: clamp(2.5rem, 8vw, 5.5rem);
      font-weight: 900; line-height: 1; margin-top: 12px;
      background: linear-gradient(135deg, #80c830 0%, #e07898 40%, #48a8d0 80%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      letter-spacing: -2px;
    }

    .subtitle { margin-top: 16px; font-size: 1.1rem; color: var(--muted); letter-spacing: 4px; text-transform: uppercase; font-weight: 600; }

    .stats-bar { display: flex; justify-content: center; gap: 40px; margin-top: 30px; flex-wrap: wrap; }
    .stat { text-align: center; }
    .stat-num {
      font-family: 'Unbounded', sans-serif; font-size: 1.8rem; font-weight: 700;
      background: linear-gradient(135deg, #80c830, #e07898);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .stat-label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; }

    .search-wrap {
      position: relative; z-index: 10;
      display: flex; justify-content: center; padding: 28px 20px 8px;
    }
    .search-input {
      background: #ffffff; border: 1px solid rgba(100,180,100,0.25);
      border-radius: 50px; color: var(--text);
      font-family: 'Nunito', sans-serif; font-size: 1rem; font-weight: 600;
      padding: 12px 28px; width: 100%; max-width: 500px; outline: none;
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    .search-input::placeholder { color: var(--muted); }
    .search-input:focus { border-color: #e07898; box-shadow: 0 0 20px rgba(224,120,152,0.30); }

    .loader-wrap {
      position: relative; z-index: 10;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 80px 20px; gap: 20px;
    }
    .spinner {
      width: 60px; height: 60px;
      border: 4px solid rgba(100,180,100,0.15);
      border-top-color: #e8a0b8; border-right-color: #70c8e8;
      border-radius: 50%; animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loader-text { font-family: 'Unbounded', sans-serif; font-size: 0.9rem; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; }

    .error-wrap { position: relative; z-index: 10; text-align: center; padding: 60px 20px; display: none; }
    .error-emoji { font-size: 50px; }
    .error-msg { color: var(--muted); margin-top: 12px; font-size: 1rem; }
    .retry-btn {
      margin-top: 20px;
      background: linear-gradient(135deg, #e8a0b8, #90d870);
      border: none; border-radius: 50px; color: white;
      font-family: 'Unbounded', sans-serif; font-size: 0.8rem; font-weight: 700;
      letter-spacing: 1px; padding: 12px 28px; cursor: none;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .retry-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 30px var(--glow1); }

    .gallery {
      position: relative; z-index: 10;
      columns: 4 260px; column-gap: 18px;
      padding: 20px 30px 80px; max-width: 1600px; margin: 0 auto;
    }

    .meme-card {
      break-inside: avoid; margin-bottom: 18px;
      background: var(--card); border-radius: 20px;
      overflow: hidden; border: 1px solid rgba(100,180,100,0.18);
      transition: transform 0.3s cubic-bezier(.17,.67,.12,1.3), box-shadow 0.3s, border-color 0.3s;
      cursor: none; position: relative;
      animation: fadeUp 0.5s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .meme-card:hover {
      transform: translateY(-6px) scale(1.02);
      border-color: var(--accent1);
      box-shadow: 0 20px 50px rgba(100,160,100,0.18), 0 0 30px rgba(144,216,112,0.25);
    }
    .meme-card.hot::before {
      content: '🔥 ХИТ';
      position: absolute; top: 12px; right: 12px; z-index: 5;
      background: linear-gradient(135deg, #e8a0b8, #ffe870);
      color: white; font-family: 'Unbounded', sans-serif;
      font-size: 0.65rem; font-weight: 700; padding: 5px 10px; border-radius: 20px; letter-spacing: 1px;
    }

    .meme-img-wrap {
      position: relative; overflow: hidden;
      background: linear-gradient(90deg, #e8f8e0 25%, #f0fce8 50%, #e8f8e0 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }
    .meme-img-wrap.loaded { animation: none; background: #f0f8ee; }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    .meme-img-wrap img { width: 100%; display: block; transition: transform 0.4s ease; }
    .meme-card:hover .meme-img-wrap img { transform: scale(1.04); }

    .meme-footer { padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; }
    .meme-name {
      font-size: 0.7rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px;
      color: #5a9a30; background: rgba(144,216,112,0.18); padding: 4px 10px; border-radius: 20px;
      max-width: 150px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .meme-actions { display: flex; gap: 8px; align-items: center; }
    .meme-btn { background: none; border: none; font-size: 1.1rem; cursor: none; transition: transform 0.2s; line-height: 1; }
    .meme-btn:hover { transform: scale(1.4) rotate(-10deg); }
    .like-count { font-size: 0.75rem; color: var(--muted); font-weight: 700; margin-left: -4px; }

    .load-more-wrap { position: relative; z-index: 10; display: flex; justify-content: center; padding: 10px 20px 60px; }
    .load-more-btn {
      background: #ffffff; border: 1px solid rgba(100,180,100,0.25);
      border-radius: 50px; color: var(--text);
      font-family: 'Unbounded', sans-serif; font-size: 0.8rem; font-weight: 700;
      letter-spacing: 1px; padding: 14px 36px; cursor: none;
      transition: all 0.25s ease; display: none;
    }
    .load-more-btn:hover {
      background: linear-gradient(135deg, #90d870, #e8a0b8);
      border-color: transparent; box-shadow: 0 8px 25px var(--glow1); transform: translateY(-2px);
    }

    .float-emoji {
      position: fixed; pointer-events: none; z-index: 1;
      animation: floatUp 8s linear infinite; opacity: 0;
    }
    @keyframes floatUp {
      0%   { opacity: 0; transform: translateY(0) rotate(0deg); }
      10%  { opacity: 0.6; }
      90%  { opacity: 0.3; }
      100% { opacity: 0; transform: translateY(-100vh) rotate(360deg); }
    }

    footer {
      position: relative; z-index: 10;
      text-align: center; padding: 40px 20px; color: var(--muted); font-size: 0.85rem;
      border-top: 1px solid rgba(100,180,100,0.2);
    }
    footer span {
      background: linear-gradient(135deg, #e07898, #48a8d0);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; font-weight: 800;
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #e8f8e0; }
    ::-webkit-scrollbar-thumb { background: #90d870; border-radius: 3px; }

    @media (max-width: 600px) {
      .gallery { padding: 0 12px 60px; }
      h1 { letter-spacing: -1px; }
    }
  </style>
</head>
<body>

  <div class="cursor" id="cursor"></div>
  <div class="cursor-ring" id="cursorRing"></div>

  <header>
    <span class="logo-emoji">😂</span>
    <h1>МЕМ PALACE</h1>
    <p class="subtitle">Лучшие мемы из интернета</p>
    <div class="stats-bar">
      <div class="stat"><div class="stat-num" id="statTotal">...</div><div class="stat-label">Мемов</div></div>
      <div class="stat"><div class="stat-num">98%</div><div class="stat-label">Смеются</div></div>
      <div class="stat"><div class="stat-num">∞</div><div class="stat-label">Настроение</div></div>
    </div>
  </header>

  <div class="search-wrap">
    <input class="search-input" type="text" id="searchInput" placeholder="🔍 Поиск мемов..." oninput="filterBySearch()" />
  </div>

  <div class="loader-wrap" id="loader">
    <div class="spinner"></div>
    <div class="loader-text">Загружаем мемы из интернета...</div>
  </div>

  <div class="error-wrap" id="errorWrap">
    <div class="error-emoji">😵</div>
    <div class="error-msg">Не удалось загрузить мемы. Проверьте интернет-соединение.</div>
    <button class="retry-btn" onclick="loadMemes()">Попробовать снова</button>
  </div>

  <div class="gallery" id="gallery"></div>

  <div class="load-more-wrap">
    <button class="load-more-btn" id="loadMoreBtn" onclick="showMore()">Загрузить ещё 😂</button>
  </div>

  <footer>
    Реальные мемы из интернета • Источник: <span>Imgflip API</span> • МЕМ PALACE © 2024
  </footer>

  <script>
    // Custom cursor
    const cursor = document.getElementById('cursor');
    const ring   = document.getElementById('cursorRing');
    let mx = 0, my = 0, rx = 0, ry = 0;
    document.addEventListener('mousemove', e => {
      mx = e.clientX; my = e.clientY;
      cursor.style.transform = `translate(${mx-9}px,${my-9}px)`;
    });
    (function animRing() {
      rx += (mx-rx)*0.12; ry += (my-ry)*0.12;
      ring.style.transform = `translate(${rx-20}px,${ry-20}px)`;
      requestAnimationFrame(animRing);
    })();

    // Floating emojis
    const floatArr = ['😂','🤣','💀','😭','🔥','💯','😅','🤡','👀','😤','🫠','💅'];
    setInterval(() => {
      const el = document.createElement('div');
      el.className = 'float-emoji';
      el.textContent = floatArr[Math.floor(Math.random()*floatArr.length)];
      el.style.left = Math.random()*100+'vw';
      el.style.bottom = '-60px';
      el.style.animationDuration = (6+Math.random()*6)+'s';
      el.style.fontSize = (1.2+Math.random()*1.5)+'rem';
      document.body.appendChild(el);
      setTimeout(()=>el.remove(), 13000);
    }, 2000);

    let allMemes = [];
    let filtered  = [];
    let shown      = 0;
    const PER_PAGE = 20;

    function randLikes() {
      return (Math.random()*99+0.5).toFixed(1)+'k';
    }

    async function loadMemes() {
      document.getElementById('loader').style.display        = 'flex';
      document.getElementById('errorWrap').style.display     = 'none';
      document.getElementById('gallery').innerHTML           = '';
      document.getElementById('loadMoreBtn').style.display   = 'none';
      shown = 0;

      try {
        const resp = await fetch('https://api.imgflip.com/get_memes');
        if (!resp.ok) throw new Error('Network error');
        const data = await resp.json();
        if (!data.success) throw new Error('API fail');

        allMemes = data.data.memes.map((m, i) => ({
          ...m,
          likes: randLikes(),
          hot: i < 5,
        }));

        document.getElementById('statTotal').textContent = allMemes.length + '+';
        filtered = [...allMemes];

        document.getElementById('loader').style.display = 'none';
        renderMemes(filtered.slice(0, PER_PAGE));
        shown = PER_PAGE;

        if (filtered.length > shown) {
          document.getElementById('loadMoreBtn').style.display = 'inline-block';
        }

      } catch(e) {
        document.getElementById('loader').style.display    = 'none';
        document.getElementById('errorWrap').style.display = 'block';
      }
    }

    function renderMemes(list) {
      const gallery = document.getElementById('gallery');
      list.forEach((m, idx) => {
        const card = document.createElement('div');
        card.className = 'meme-card' + (m.hot ? ' hot' : '');
        card.dataset.name = m.name.toLowerCase();
        card.style.animationDelay = (idx * 0.04) + 's';

        card.innerHTML = `
          <div class="meme-img-wrap" id="wrap-${m.id}">
            <img src="${m.url}" alt="${m.name}" loading="lazy" onload="document.getElementById('wrap-${m.id}').classList.add('loaded')">
          </div>
          <div class="meme-footer">
            <span class="meme-name" title="${m.name}">${m.name}</span>
            <div class="meme-actions">
              <button class="meme-btn" onclick="like(this)">😂</button>
              <span class="like-count">${m.likes}</span>
              <button class="meme-btn" onclick="copyLink('${m.url}', this)">🔗</button>
            </div>
          </div>
        `;
        gallery.appendChild(card);
      });
    }

    function showMore() {
      const next = filtered.slice(shown, shown + PER_PAGE);
      renderMemes(next);
      shown += PER_PAGE;
      if (shown >= filtered.length) {
        document.getElementById('loadMoreBtn').style.display = 'none';
      }
    }

    function filterBySearch() {
      const q = document.getElementById('searchInput').value.toLowerCase().trim();
      filtered = q ? allMemes.filter(m => m.name.toLowerCase().includes(q)) : [...allMemes];
      document.getElementById('gallery').innerHTML = '';
      shown = 0;
      renderMemes(filtered.slice(0, PER_PAGE));
      shown = PER_PAGE;
      const btn = document.getElementById('loadMoreBtn');
      btn.style.display = filtered.length > PER_PAGE ? 'inline-block' : 'none';
    }

    function like(btn) {
      btn.style.transform = 'scale(1.8) rotate(-15deg)';
      setTimeout(() => btn.style.transform = '', 300);
      const countEl = btn.nextElementSibling;
      if (countEl) {
        const val = parseFloat(countEl.textContent);
        countEl.textContent = (val + 0.1).toFixed(1) + 'k';
        countEl.style.color = '#e07898';
      }
    }

    function copyLink(url, btn) {
      navigator.clipboard.writeText(url).catch(()=>{});
      btn.textContent = '✅';
      setTimeout(() => btn.textContent = '🔗', 1500);
    }

    loadMemes();
  </script>
</body>
</html>
